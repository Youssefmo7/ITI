<div class="cards-container">
    <h2>Favorites List ({{ favorites.length }})</h2>
    @for (product of favorites; track $index) {
        <app-card 
            (addToFavoritesEvent)="addToFavorites($event)"
            (deleteProductEvent)="deleteProduct($event)"
            [product]="product">
        </app-card>
    }
</div>
