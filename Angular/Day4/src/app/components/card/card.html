<div class="card">
  <h3>{{ product.name }}</h3>
  <p>Price: {{ product.price }}</p>
  <p>Description: {{ product.desc }}</p>
  <div class="card-actions">
    <button class="favorite-btn" (click)="addToFavorites()">Favorites</button>
    <button class="delete-btn" (click)="deleteProduct()">Delete</button>
  </div>
</div>
