
<div class="app-cont">
  @if(notification) {
    <p class="top-notification" [class]="notification">
      {{notification == "success" ? "product added successfully" : "failed to add product. Please check your data"}}
    </p>
  }

  <app-input-form (addProduct)="onAddProduct($event)" (notify)="OnNotify($event)"></app-input-form>
  <app-display-panel 
    (addToFavoritesEvent)="onAddToFavorites($event)" 
    (deleteProductEvent)="onDeleteProduct($event)" 
    [products]="products" >
  </app-display-panel>

  <app-favorites-panel 
    (addToFavoritesEvent)="onAddToFavorites($event)" 
    (deleteProductEvent)="onDeleteProduct($event)" 
    [favorites]="favorites" >
  </app-favorites-panel>
</div>
